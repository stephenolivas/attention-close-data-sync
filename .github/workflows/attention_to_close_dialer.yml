name: Attention → Close Dialer Enrichment

on:
  schedule:
    # Hourly at :30, scheduled AFTER:
    #   :00 - existing Attention → Close sync (video calls)
    #   :15 - close_to_attention_sync (Close dialer → Attention)
    # This gives imported dialer calls 15 minutes to process before
    # we look for them. Late-processed ones get picked up next round
    # (idempotency check prevents duplicates).
    - cron: '30 * * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Window of Attention conversations to consider, in hours'
        required: false
        default: '24'
      dry_run:
        description: 'Dry run (1 = log payloads without writing to Close)'
        required: false
        default: '0'

concurrency:
  group: attention-to-close-dialer-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run enrichment
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          ATTENTION_API_KEY: ${{ secrets.ATTENTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HOURS_BACK: ${{ inputs.hours_back || '24' }}
          DRY_RUN: ${{ inputs.dry_run || '0' }}
        run: python3 -u attention_to_close_dialer_sync.py
